<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 851px; height: 315px; overflow: hidden; }
  body {
    background: #0a0d16;
    color: #eceef6;
    font-family: "Inter", system-ui, sans-serif;
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
  }
  /* coordinate grid */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
    background-size: 40px 40px;
    -webkit-mask-image: radial-gradient(ellipse 80% 90% at 50% 30%, #000 25%, transparent 78%);
    mask-image: radial-gradient(ellipse 80% 90% at 50% 30%, #000 25%, transparent 78%);
  }
  .glow { position: absolute; top: -160px; left: 50%; transform: translateX(-50%); width: 760px; height: 420px; background: radial-gradient(circle at 50% 45%, rgba(90,120,255,.28), transparent 62%); filter: blur(8px); }
  .glow-amber { position: absolute; bottom: -140px; right: 60px; width: 320px; height: 260px; background: radial-gradient(circle, rgba(245,165,36,.14), transparent 65%); filter: blur(6px); }

  .content { position: relative; z-index: 2; padding: 0 60px; }
  .eyebrow {
    font-family: "JetBrains Mono", monospace; font-size: 13px; letter-spacing: .28em;
    text-transform: uppercase; color: #7a92ff; margin-bottom: 16px;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .eyebrow::before, .eyebrow::after { content: ""; width: 28px; height: 1px; background: rgba(122,146,255,.5); }
  h1 {
    font-family: "Bricolage Grotesque", sans-serif; font-weight: 800;
    font-size: 52px; line-height: 1.02; letter-spacing: -.025em;
  }
  h1 .hl { color: #f5a524; }
  .sub { margin-top: 16px; font-size: 18px; color: #b9c0d4; font-weight: 500; }
  .chips { margin-top: 18px; display: flex; gap: 10px; justify-content: center; }
  .chip {
    font-family: "JetBrains Mono", monospace; font-size: 12.5px; color: #c7cee0;
    border: 1px solid rgba(255,255,255,.14); border-radius: 999px; padding: 6px 14px;
    background: rgba(255,255,255,.03);
  }
  .url {
    position: absolute; z-index: 2; bottom: 20px; left: 50%; transform: translateX(-50%);
    font-family: "JetBrains Mono", monospace; font-size: 13px; letter-spacing: .04em; color: #626a80;
  }
  .url b { color: #7a92ff; font-weight: 500; }
  /* brand mark top-right */
  .mark {
    position: absolute; z-index: 2; top: 22px; right: 26px;
    font-family: "JetBrains Mono", monospace; font-size: 14px; color: #8891a6;
    display: flex; align-items: center; gap: 9px;
  }
  .mark .k { width: 26px; height: 26px; border-radius: 7px; display: grid; place-items: center; background: rgba(90,120,255,.16); border: 1px solid rgba(90,120,255,.4); color: #7a92ff; font-weight: 700; }
  .mark .dim { color: #4b5266; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="glow-amber"></div>

  <div class="mark"><span class="k">K</span> kined<span class="dim">.dev</span></div>

  <div class="content">
    <span class="eyebrow">Freelance · Web &amp; Mobile</span>
    <h1>De la conception<br>au <span class="hl">déploiement</span>.</h1>
    <div class="sub">Développeur Fullstack — je conçois et déploie vos produits</div>
    <div class="chips">
      <span class="chip">Sites</span>
      <span class="chip">Applications</span>
      <span class="chip">Plateformes</span>
      <span class="chip">E-commerce</span>
    </div>
  </div>

  <div class="url">🌐 <b>ki-ned.github.io/ki-ned</b></div>
</body>
</html>
